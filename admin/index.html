<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waitlist Admin — Regenerative Village</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a14; --ink-soft: #4a4a3a; --bark: #7a6a52;
      --sage: #5a7a52; --sage-light: #8aab80; --earth: #c4a97a;
      --cream: #f8f5ee; --offwhite: #faf9f6; --white: #fff;
      --mist: #e8e4da; --border: #d8d3c8;
      --font-serif: 'Fraunces', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
      --radius: 8px; --radius-full: 9999px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body { background: var(--offwhite); color: var(--ink); font-family: var(--font-sans); font-size: 0.93rem; line-height: 1.55; }

    /* Auth screen */
    #auth-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100svh; padding: 2rem;
    }
    .auth-card {
      background: var(--cream); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 360px;
    }
    .auth-card h1 { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 300; margin-bottom: 1.5rem; }
    .auth-card label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--ink-soft); margin-bottom: 0.4em; }
    .auth-card input {
      width: 100%; font-family: var(--font-sans); font-size: 0.95rem;
      border: 1.5px solid var(--mist); border-radius: var(--radius); padding: 0.75em 1em;
      background: var(--white); outline: none; margin-bottom: 1rem;
    }
    .auth-card input:focus { border-color: var(--sage); }
    .auth-error { color: #c0392b; font-size: 0.82rem; margin-bottom: 0.75rem; display: none; }
    .btn { background: var(--sage); color: white; border: none; border-radius: var(--radius-full); padding: 0.8em 1.6em; font-family: var(--font-sans); font-size: 0.9rem; font-weight: 500; cursor: pointer; width: 100%; transition: background 200ms; }
    .btn:hover { background: var(--ink); }

    /* Main layout */
    #main-screen { display: none; padding: 2rem; min-height: 100svh; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: gap; gap: 1rem; }
    .page-header h1 { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 300; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--cream); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
    .stat-label { font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--bark); margin-bottom: 0.4em; }
    .stat-value { font-family: var(--font-serif); font-size: 2rem; font-weight: 300; color: var(--ink); }

    /* Table */
    .table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
    .table-title { font-weight: 500; font-size: 0.9rem; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); padding: 0.75rem 1.25rem; text-align: left; background: var(--cream); border-bottom: 1px solid var(--border); }
    td { padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--mist); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f5f3ee; }
    .name-cell { font-weight: 500; color: var(--ink); }
    .email-cell { color: var(--ink-soft); font-size: 0.875rem; }
    .slug-cell { font-family: monospace; font-size: 0.82rem; color: var(--bark); }
    .count-cell { font-family: var(--font-serif); font-size: 1.1rem; font-weight: 300; text-align: center; }
    .badge { display: inline-block; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.25em 0.65em; border-radius: var(--radius-full); }
    .badge-pioneer { background: #e8f0e5; color: #3a6a32; }
    .badge-founder { background: #c4a97a22; color: #7a5a22; }
    .badge-none { color: var(--mist); }
    .date-cell { font-size: 0.8rem; color: var(--ink-soft); }
    .ref-cell { font-size: 0.8rem; color: var(--ink-soft); font-style: italic; }
    .empty-state { text-align: center; padding: 3rem; color: var(--ink-soft); }
    .loader { text-align: center; padding: 3rem; color: var(--ink-soft); }

    @media (max-width: 700px) {
      #main-screen { padding: 1rem; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 640px; }
    }
  </style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>Waitlist Admin</h1>
    <label for="token-input">Admin token</label>
    <input type="password" id="token-input" placeholder="Enter admin token" autocomplete="current-password">
    <div class="auth-error" id="auth-error">Incorrect token. Try again.</div>
    <button class="btn" id="auth-btn">Access dashboard →</button>
  </div>
</div>

<!-- Main screen -->
<div id="main-screen">
  <div class="page-header">
    <h1>Waitlist — Referral Leaderboard</h1>
    <button class="btn" style="width:auto;padding:0.5em 1.2em;font-size:0.85rem" onclick="loadData()">↻ Refresh</button>
  </div>

  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-label">Total members</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Referred signups</div><div class="stat-value" id="stat-referrals">—</div></div>
    <div class="stat-card"><div class="stat-label">Pioneers (3+ refs)</div><div class="stat-value" id="stat-pioneers">—</div></div>
    <div class="stat-card"><div class="stat-label">Founder Pioneers (5+)</div><div class="stat-value" id="stat-founder">—</div></div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <span class="table-title">Members sorted by referral count</span>
    </div>
    <div id="table-container">
      <div class="loader">Loading…</div>
    </div>
  </div>
</div>

<script>
  let adminToken = '';

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function tierBadge(tier) {
    if (tier >= 2) return '<span class="badge badge-founder">Founder Pioneer</span>';
    if (tier >= 1) return '<span class="badge badge-pioneer">Pioneer</span>';
    return '<span class="badge badge-none">—</span>';
  }

  async function loadData() {
    const container = document.getElementById('table-container');
    container.innerHTML = '<div class="loader">Loading…</div>';

    try {
      const res = await fetch(`/api/admin/leaderboard?token=${encodeURIComponent(adminToken)}`);
      if (res.status === 401) {
        document.getElementById('auth-error').textContent = 'Session expired. Reload and re-enter token.';
        document.getElementById('auth-error').style.display = 'block';
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('main-screen').style.display = 'none';
        return;
      }
      const data = await res.json();

      // Stats
      document.getElementById('stat-total').textContent = data.stats.totalMembers;
      document.getElementById('stat-referrals').textContent = data.stats.totalReferrals;
      document.getElementById('stat-pioneers').textContent = data.stats.pioneers;
      document.getElementById('stat-founder').textContent = data.stats.founderPioneers;

      // Table
      if (!data.members.length) {
        container.innerHTML = '<div class="empty-state">No members yet.</div>';
        return;
      }

      const rows = data.members.map(m => `
        <tr>
          <td class="name-cell">${escHtml(m.name)}</td>
          <td class="email-cell">${escHtml(m.email)}</td>
          <td class="slug-cell">${escHtml(m.referral_slug)}</td>
          <td class="count-cell">${m.referral_count}</td>
          <td>${tierBadge(m.pioneer_tier)}</td>
          <td class="ref-cell">${m.referred_by_slug ? escHtml(m.referred_by_slug) : '—'}</td>
          <td class="date-cell">${formatDate(m.signed_up_at)}</td>
        </tr>
      `).join('');

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Referral slug</th>
              <th style="text-align:center">Refs</th>
              <th>Status</th>
              <th>Referred by</th>
              <th>Joined</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch (e) {
      container.innerHTML = `<div class="empty-state">Error loading data: ${escHtml(e.message)}</div>`;
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Auth
  document.getElementById('auth-btn').addEventListener('click', async () => {
    const token = document.getElementById('token-input').value.trim();
    if (!token) return;

    const res = await fetch(`/api/admin/leaderboard?token=${encodeURIComponent(token)}`);
    if (res.status === 401) {
      document.getElementById('auth-error').style.display = 'block';
      return;
    }
    adminToken = token;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    const data = await res.json();

    document.getElementById('stat-total').textContent = data.stats.totalMembers;
    document.getElementById('stat-referrals').textContent = data.stats.totalReferrals;
    document.getElementById('stat-pioneers').textContent = data.stats.pioneers;
    document.getElementById('stat-founder').textContent = data.stats.founderPioneers;

    if (!data.members.length) {
      document.getElementById('table-container').innerHTML = '<div class="empty-state">No members yet.</div>';
      return;
    }

    const rows = data.members.map(m => `
      <tr>
        <td class="name-cell">${escHtml(m.name)}</td>
        <td class="email-cell">${escHtml(m.email)}</td>
        <td class="slug-cell">${escHtml(m.referral_slug)}</td>
        <td class="count-cell">${m.referral_count}</td>
        <td>${tierBadge(m.pioneer_tier)}</td>
        <td class="ref-cell">${m.referred_by_slug ? escHtml(m.referred_by_slug) : '—'}</td>
        <td class="date-cell">${formatDate(m.signed_up_at)}</td>
      </tr>
    `).join('');

    document.getElementById('table-container').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Referral slug</th>
            <th style="text-align:center">Refs</th>
            <th>Status</th>
            <th>Referred by</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  });

  document.getElementById('token-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('auth-btn').click();
  });

  // If no ADMIN_TOKEN is set server-side, the page loads directly
  // (dev mode: token check is skipped)
  fetch('/api/admin/leaderboard').then(r => {
    if (r.ok) {
      adminToken = '';
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      loadData();
    }
  }).catch(() => {});
</script>
</body>
</html>
